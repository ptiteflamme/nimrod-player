<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elgar – Nimrod</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f7f4ef;
      color: #222;
    }

    .card {
      width: min(92vw, 420px);
      padding: 36px 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.10);
      text-align: center;
    }

    .label {
      margin-bottom: 10px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #8a7d6d;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 650;
      line-height: 1.2;
    }

    .subtitle {
      margin: 12px 0 28px;
      font-size: 15px;
      color: #6f665c;
      line-height: 1.6;
    }

    audio {
      width: 100%;
      margin-top: 4px;
    }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #9a9187;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="label">A small piece for you</div>
    <h1>Elgar – Nimrod</h1>
    <p class="subtitle">from <em>Enigma Variations, Op. 36</em></p>

    <audio controls preload="metadata">
      <source src="music.mp3" type="audio/mpeg" />
      您的浏览器不支持音频播放。
    </audio>

    <p class="note">愿你永恒的旅途中，有风与光相候。</p>
  </main>
</body>
</html>
